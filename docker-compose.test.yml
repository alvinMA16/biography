# 测试环境 Docker Compose
# 用法: docker compose -p biography-test -f docker-compose.test.yml up -d --build
# 注意: 使用独立的 .env.test 文件（放在同目录下）

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biography}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-biography_test}
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biography}"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  doubao:
    build: ./doubao-service
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      DOUBAO_APP_ID: ${DOUBAO_APP_ID}
      DOUBAO_ACCESS_KEY: ${DOUBAO_ACCESS_KEY}
      DOUBAO_SPEAKER: ${DOUBAO_SPEAKER:-zh_female_xiaohe_jupiter_bigtts}
      DOUBAO_ASR_SILENCE_MS: ${DOUBAO_ASR_SILENCE_MS:-4000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      doubao:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8002:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-biography}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-biography_test}
      DOUBAO_SERVICE_URL: ws://doubao:9000/ws
      DOUBAO_SPEAKER: ${DOUBAO_SPEAKER:-zh_female_xiaohe_jupiter_bigtts}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      DASHSCOPE_MODEL_FAST: ${DASHSCOPE_MODEL_FAST:-qwen-turbo}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-30}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      LLM_PROVIDER_DEFAULT: ${LLM_PROVIDER_DEFAULT:-dashscope}
      LLM_PROVIDER_MEMOIR: ${LLM_PROVIDER_MEMOIR:-}
      LLM_PROVIDER_SUMMARY: ${LLM_PROVIDER_SUMMARY:-}
      LLM_PROVIDER_TOPIC: ${LLM_PROVIDER_TOPIC:-}
      LLM_PROVIDER_PROFILE: ${LLM_PROVIDER_PROFILE:-}
      LLM_PROVIDER_INTERVENTION: ${LLM_PROVIDER_INTERVENTION:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_SOCK5_PROXY: ${GEMINI_SOCK5_PROXY:-}
      GEMINI_HTTP_PROXY: ${GEMINI_HTTP_PROXY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_MODEL_FAST: ${GEMINI_MODEL_FAST:-gemini-2.0-flash-lite}
      WORKERS: ${WORKERS:-2}
      DEBUG: ${DEBUG:-true}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata-test:
